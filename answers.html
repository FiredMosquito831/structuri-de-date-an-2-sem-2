<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Structures Correct Answer Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #07111f;
            --panel: rgba(19, 30, 48, 0.9);
            --panel-2: rgba(28, 42, 65, 0.92);
            --line: rgba(148, 163, 184, 0.24);
            --text: #eef5ff;
            --muted: #9fb2ce;
            --blue: #4f8cff;
            --green: #36d98b;
            --amber: #f7b955;
            --danger: #fb7185;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 8%, rgba(79, 140, 255, 0.24), transparent 34rem),
                radial-gradient(circle at 90% 15%, rgba(54, 217, 139, 0.16), transparent 28rem),
                linear-gradient(145deg, #07111f, #111827 58%, #08101e);
            color: var(--text);
            font-family: "Space Grotesk", sans-serif;
        }

        .page {
            width: min(1180px, calc(100% - 28px));
            margin: 0 auto;
            padding: 34px 0 64px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            margin-bottom: 22px;
        }

        a {
            color: inherit;
        }

        .back {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .hero {
            border: 1px solid var(--line);
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(29, 42, 66, 0.96), rgba(13, 22, 38, 0.86));
            padding: clamp(26px, 5vw, 48px);
            box-shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
            overflow: hidden;
            position: relative;
        }

        .hero::after {
            content: "";
            width: 280px;
            height: 280px;
            position: absolute;
            right: -110px;
            top: -110px;
            border-radius: 50%;
            border: 46px solid rgba(79, 140, 255, 0.12);
        }

        h1 {
            margin: 0;
            max-width: 820px;
            font-family: "Source Serif 4", serif;
            font-size: clamp(42px, 7vw, 78px);
            line-height: 0.95;
            letter-spacing: -0.055em;
        }

        .lead {
            margin: 18px 0 0;
            max-width: 760px;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.62;
        }

        .search-panel {
            margin-top: 22px;
            border: 1px solid var(--line);
            border-radius: 26px;
            background: var(--panel);
            padding: 18px;
            position: sticky;
            top: 12px;
            z-index: 2;
            backdrop-filter: blur(16px);
        }

        .search-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
        }

        input[type="search"] {
            width: 100%;
            min-height: 52px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: rgba(4, 9, 18, 0.48);
            color: var(--text);
            padding: 0 16px;
            font: inherit;
            outline: none;
        }

        input[type="search"]:focus {
            border-color: rgba(79, 140, 255, 0.75);
            box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.14);
        }

        .btn {
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border-radius: 15px;
            min-height: 42px;
            padding: 10px 14px;
            font: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn.primary {
            min-height: 52px;
            background: linear-gradient(135deg, var(--blue), #6554f5);
            border-color: transparent;
            min-width: 132px;
        }

        .controls {
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .mini-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .lang-toggle {
            display: inline-flex;
            background: rgba(255, 255, 255, 0.07);
            padding: 4px;
            border-radius: 14px;
            border: 1px solid var(--line);
        }

        .lang-toggle button {
            border: 0;
            color: var(--muted);
            background: transparent;
            padding: 8px 13px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .lang-toggle button.active {
            color: var(--text);
            background: rgba(79, 140, 255, 0.28);
        }

        .set-grid {
            margin-top: 14px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            max-height: 240px;
            overflow: auto;
            padding-right: 4px;
        }

        .set-chip {
            border: 1px solid rgba(148, 163, 184, 0.24);
            background: rgba(255, 255, 255, 0.045);
            color: var(--muted);
            padding: 12px;
            border-radius: 15px;
            text-align: left;
            cursor: pointer;
            font: inherit;
            min-height: 66px;
        }

        .set-chip.active {
            color: var(--text);
            border-color: rgba(79, 140, 255, 0.72);
            background: rgba(79, 140, 255, 0.18);
        }

        .set-chip strong,
        .set-chip span {
            display: block;
        }

        .set-chip strong {
            font-size: 12px;
            line-height: 1.2;
        }

        .set-chip span {
            margin-top: 4px;
            font-size: 11px;
            opacity: 0.76;
        }

        .status {
            margin: 18px 0 10px;
            color: var(--muted);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .results {
            display: grid;
            gap: 14px;
        }

        .result-card {
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--panel-2);
            padding: 18px;
        }

        .result-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .badge {
            color: #dbeafe;
            border: 1px solid rgba(79, 140, 255, 0.38);
            background: rgba(79, 140, 255, 0.16);
            border-radius: 999px;
            padding: 5px 9px;
        }

        .question {
            font-size: 18px;
            line-height: 1.45;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .result-images,
        .answer-images {
            display: grid;
            gap: 10px;
            margin: 10px 0 14px;
        }

        .result-images img,
        .answer-images img {
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: #fff;
        }

        .answer-images {
            margin: 8px 0 0;
        }

        .answers {
            display: grid;
            gap: 8px;
        }

        .answer {
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 14px;
            padding: 11px 12px;
            color: #cbd5e1;
            background: rgba(255, 255, 255, 0.035);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 10px;
            align-items: start;
            font-size: 14px;
            line-height: 1.45;
        }

        .answer.correct {
            border-color: rgba(54, 217, 139, 0.72);
            background: rgba(54, 217, 139, 0.12);
            color: #eafff3;
        }

        mark {
            background: rgba(247, 185, 85, 0.28);
            color: inherit;
            border-radius: 4px;
            padding: 0 2px;
        }

        .empty {
            border: 1px dashed rgba(148, 163, 184, 0.32);
            border-radius: 22px;
            padding: 28px;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 900px) {
            .search-row,
            .set-grid {
                grid-template-columns: 1fr;
            }

            .search-panel {
                position: static;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="topbar">
            <a class="back" href="./index.html">← Back to quiz</a>
            <a class="btn" href="./materials.html">Study Materials</a>
        </div>

        <section class="hero">
            <h1>Correct Answer Search</h1>
            <p class="lead">Search selected MCQ sets by question text, any answer text, or the correct solution. Set selection stays editable after searching, so you can narrow or expand results without resetting the page.</p>
        </section>

        <section class="search-panel">
            <div class="search-row">
                <input id="query" type="search" placeholder="Search question or answer text, e.g. sigma scaling, PMX, permutation..." autocomplete="off">
                <button id="searchButton" class="btn primary" type="button"><i class="ph-bold ph-magnifying-glass"></i> Search</button>
            </div>

            <div class="controls">
                <div class="mini-actions">
                    <button id="topSetsButton" class="btn" type="button">Top Sets</button>
                    <button id="selectAllButton" class="btn" type="button">Select All</button>
                    <button id="clearButton" class="btn" type="button">Clear</button>
                </div>
                <div class="lang-toggle" aria-label="Language">
                    <button id="roButton" class="active" type="button">RO</button>
                    <button id="enButton" type="button">EN</button>
                </div>
            </div>

            <div id="setGrid" class="set-grid" aria-label="Question sets"></div>
        </section>

        <div class="status">
            <span id="loadStatus">Loading sets...</span>
            <span id="resultStatus">No search yet.</span>
        </div>

        <section id="results" class="results"></section>
    </main>

    <script>
        const APP_DATA_VERSION = 'data-structures-grile-txt-answer-search-2026-06-04';
        const TOP_SET_IDS = ['sdd_test', 'fromForms', 'grile1'];
        const state = {
            config: null,
            language: 'ro',
            selectedSets: new Set(TOP_SET_IDS),
            loadedSets: new Map(),
            lastQuery: '',
        };

        const els = {
            query: document.getElementById('query'),
            searchButton: document.getElementById('searchButton'),
            setGrid: document.getElementById('setGrid'),
            loadStatus: document.getElementById('loadStatus'),
            resultStatus: document.getElementById('resultStatus'),
            results: document.getElementById('results'),
            topSetsButton: document.getElementById('topSetsButton'),
            selectAllButton: document.getElementById('selectAllButton'),
            clearButton: document.getElementById('clearButton'),
            roButton: document.getElementById('roButton'),
            enButton: document.getElementById('enButton'),
        };

        const fetchJson = (path) => fetch(`${path}?v=${encodeURIComponent(APP_DATA_VERSION)}`, { cache: 'no-store' }).then(res => {
            if (!res.ok) throw new Error(`Failed to load ${path}`);
            return res.json();
        });

        const normalize = (text) => String(text || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

        function escapeHtml(text) {
            return String(text || '').replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;',
            }[char]));
        }

        function highlight(text, query) {
            const safe = escapeHtml(text);
            const trimmed = query.trim();
            if (!trimmed) return safe;
            const terms = trimmed.split(/\s+/).filter(Boolean).slice(0, 8).map(term => term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
            if (!terms.length) return safe;
            return safe.replace(new RegExp(`(${terms.join('|')})`, 'gi'), '<mark>$1</mark>');
        }

        function getQuestionList(rawData) {
            if (Array.isArray(rawData)) return rawData;
            if (rawData?.questions && Array.isArray(rawData.questions)) return rawData.questions;
            if (rawData?.question_sets) {
                return Object.values(rawData.question_sets).flatMap(set => set.questions || []);
            }
            return [];
        }

        function normalizeQuestion(rawQuestion) {
            const normalizeImages = (images) => (Array.isArray(images) ? images : [])
                .map((image, index) => {
                    if (typeof image === 'string') return { src: image, alt: `Question image ${index + 1}` };
                    return {
                        src: String(image?.src || '').trim(),
                        alt: String(image?.alt || `Question image ${index + 1}`).trim(),
                    };
                })
                .filter(image => image.src);

            const rawAnswers = Array.isArray(rawQuestion.answers)
                ? rawQuestion.answers
                : Object.entries(rawQuestion.answers || {}).map(([key, text]) => ({
                    text: `${key}) ${text}`,
                    isCorrect: Array.isArray(rawQuestion.correct) && rawQuestion.correct.includes(key),
                }));
            const answers = rawAnswers
                .map((answer, index) => ({
                    id: String.fromCharCode(97 + index),
                    text: String(answer.text || '').replace(/^[a-zA-Z]\)\s*/, '').trim(),
                    isCorrect: Boolean(answer.isCorrect),
                    images: normalizeImages(answer.images),
                }))
                .filter(answer => (answer.text && !/^[,.;:"'`]+$/.test(answer.text)) || answer.images.length);
            return {
                id: rawQuestion.id,
                question: rawQuestion.question || rawQuestion.text || '',
                images: normalizeImages(rawQuestion.images),
                answers,
            };
        }

        async function loadSet(setId) {
            const cacheKey = `${state.language}:${setId}`;
            if (state.loadedSets.has(cacheKey)) return state.loadedSets.get(cacheKey);
            const setMeta = state.config.sets[setId];
            const path = state.language === 'en' && setMeta.englishDataFile ? setMeta.englishDataFile : setMeta.dataFile;
            const data = getQuestionList(await fetchJson(path)).map(normalizeQuestion).filter(q => q.question && q.answers.length);
            state.loadedSets.set(cacheKey, data);
            return data;
        }

        function renderSetGrid() {
            const order = state.config.displayOrder.filter(setId => state.config.sets[setId]);
            els.setGrid.innerHTML = order.map(setId => {
                const set = state.config.sets[setId];
                const active = state.selectedSets.has(setId);
                return `
                    <button class="set-chip ${active ? 'active' : ''}" type="button" data-set-id="${escapeHtml(setId)}">
                        <strong>${escapeHtml(set.displayName || setId)}</strong>
                        <span>${escapeHtml(set.shortName || setId)}</span>
                    </button>
                `;
            }).join('');
        }

        function setLanguage(language) {
            state.language = language;
            els.roButton.classList.toggle('active', language === 'ro');
            els.enButton.classList.toggle('active', language === 'en');
            if (state.lastQuery) runSearch();
        }

        function setSelectedSets(ids) {
            state.selectedSets = new Set(ids);
            renderSetGrid();
            if (state.lastQuery) runSearch();
        }

        function matchesQuery(question, query) {
            if (!query) return true;
            const haystack = normalize([
                question.question,
                ...question.answers.map(answer => answer.text),
                ...(question.images || []).map(image => image.alt),
                ...question.answers.flatMap(answer => (answer.images || []).map(image => image.alt)),
                ...question.answers.filter(answer => answer.isCorrect).map(answer => answer.text),
            ].join(' '));
            return query.split(/\s+/).filter(Boolean).every(term => haystack.includes(term));
        }

        function renderImages(images, className = 'result-images') {
            if (!Array.isArray(images) || images.length === 0) return '';
            return `<div class="${className}">
                ${images.map(image => `
                    <img src="${escapeHtml(image.src)}" alt="${escapeHtml(image.alt || 'Question image')}" loading="lazy">
                `).join('')}
            </div>`;
        }

        async function runSearch() {
            const queryText = els.query.value.trim();
            state.lastQuery = queryText;
            const query = normalize(queryText);
            const selected = [...state.selectedSets].filter(setId => state.config.sets[setId]);

            if (!selected.length) {
                els.resultStatus.textContent = 'Select at least one set.';
                els.results.innerHTML = '<div class="empty">No sets selected. Choose one or more sets above.</div>';
                return;
            }

            els.resultStatus.textContent = 'Searching...';
            els.searchButton.disabled = true;
            try {
                const chunks = await Promise.all(selected.map(async setId => {
                    const questions = await loadSet(setId);
                    const setMeta = state.config.sets[setId];
                    return questions
                        .filter(question => matchesQuery(question, query))
                        .map(question => ({ setId, setName: setMeta.displayName || setId, question }));
                }));
                const results = chunks.flat().slice(0, 500);
                renderResults(results, queryText);
                const total = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
                els.resultStatus.textContent = `${total} result${total === 1 ? '' : 's'} in ${selected.length} selected set${selected.length === 1 ? '' : 's'}${total > results.length ? ' (showing first 500)' : ''}.`;
            } catch (error) {
                console.error(error);
                els.resultStatus.textContent = 'Search failed.';
                els.results.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
            } finally {
                els.searchButton.disabled = false;
            }
        }

        function renderResults(results, query) {
            if (!results.length) {
                els.results.innerHTML = '<div class="empty">No matching questions found for the selected sets.</div>';
                return;
            }
            els.results.innerHTML = results.map(({ setName, question }) => `
                <article class="result-card">
                    <div class="result-meta">
                        <span class="badge">${escapeHtml(setName)}</span>
                        <span>Question ID: ${escapeHtml(question.id)}</span>
                    </div>
                    <div class="question">${highlight(question.question, query)}</div>
                    ${renderImages(question.images)}
                    <div class="answers">
                        ${question.answers.map(answer => `
                            <div class="answer ${answer.isCorrect ? 'correct' : ''}">
                                <strong>${escapeHtml(answer.id.toUpperCase())}</strong>
                                <span>
                                    ${answer.text ? highlight(answer.text, query) : ''}
                                    ${renderImages(answer.images, 'answer-images')}
                                </span>
                                ${answer.isCorrect ? '<strong>Correct</strong>' : ''}
                            </div>
                        `).join('')}
                    </div>
                </article>
            `).join('');
        }

        async function init() {
            state.config = await fetchJson('data/config.json');
            state.selectedSets = new Set(TOP_SET_IDS.filter(setId => state.config.sets[setId]));
            renderSetGrid();
            els.loadStatus.textContent = `${state.config.displayOrder.length} sets available. ${state.selectedSets.size} top sets selected.`;
        }

        els.setGrid.addEventListener('click', (event) => {
            const button = event.target.closest('[data-set-id]');
            if (!button) return;
            const setId = button.dataset.setId;
            if (state.selectedSets.has(setId)) state.selectedSets.delete(setId);
            else state.selectedSets.add(setId);
            renderSetGrid();
            if (state.lastQuery) runSearch();
        });
        els.searchButton.addEventListener('click', runSearch);
        els.query.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') runSearch();
        });
        els.query.addEventListener('input', () => {
            if (state.lastQuery) runSearch();
        });
        els.topSetsButton.addEventListener('click', () => setSelectedSets(TOP_SET_IDS.filter(setId => state.config.sets[setId])));
        els.selectAllButton.addEventListener('click', () => setSelectedSets(state.config.displayOrder.filter(setId => state.config.sets[setId])));
        els.clearButton.addEventListener('click', () => setSelectedSets([]));
        els.roButton.addEventListener('click', () => setLanguage('ro'));
        els.enButton.addEventListener('click', () => setLanguage('en'));

        init().catch(error => {
            console.error(error);
            els.loadStatus.textContent = 'Failed to load config.';
            els.results.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        });
    </script>
</body>
</html>
